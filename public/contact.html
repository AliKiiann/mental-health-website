<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact MindCare - Get in touch with us">
    <title>Mental Health | Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo">MindCare</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Contact Hero -->
    <section class="page-hero">
        <h1>Contact Us</h1>
        <p>We're here to help. Reach out to us anytime</p>
    </section>

    <!-- Contact Section -->
    <section class="contact-section">

        <!-- Contact Info -->
        <div class="contact-info">
            <div class="info-item">
                <span class="info-icon">📍</span>
                <div>
                    <h4>Address</h4>
                    <p>123 Wellness Street, Health City</p>
                </div>
            </div>
            <div class="info-item">
                <span class="info-icon">📞</span>
                <div>
                    <h4>Phone</h4>
                    <p>+1 (555) 123-4567</p>
                </div>
            </div>
            <div class="info-item">
                <span class="info-icon">📧</span>
                <div>
                    <h4>Email</h4>
                    <p>hello@mindcare.com</p>
                </div>
            </div>
            <div class="info-item">
                <span class="info-icon">🕐</span>
                <div>
                    <h4>Working Hours</h4>
                    <p>Mon - Fri: 9am to 6pm</p>
                </div>
            </div>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
            <h2>Send us a Message</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Your name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Your email">
            </div>
            <div class="form-group">
                <label>Service</label>
                <select>
                    <option>Individual Therapy</option>
                    <option>Support Groups</option>
                    <option>Online Sessions</option>
                    <option>Family Counseling</option>
                </select>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea placeholder="How can we help you?" rows="5"></textarea>
            </div>
            <button class="btn" id="submitBtn">Send Message</button>
        </div>

    </section>

    <script src="js/main.js"></script>
</body>
</html>
